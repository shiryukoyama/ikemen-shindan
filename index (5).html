<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたの推しメン診断 溺愛アンソロ イケメン図鑑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink-light: #fce4ec;
  --pink: #e91e63;
  --pink-dark: #c2185b;
  --purple: #9c27b0;
  --text: #2d1b20;
  --text-muted: #8d6070;
  --bg: #fff9fb;
  --white: #ffffff;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(233,30,99,0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Zen Maru Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
#app { max-width: 480px; margin: 0 auto; padding: 0 16px 48px; }
.site-header { text-align: center; padding: 28px 0 20px; }
.site-logo { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: var(--text-muted); border: 1px solid #f0c0d0; padding: 4px 12px; border-radius: 999px; }
.kv { background: linear-gradient(160deg, #fff0f5 0%, #fce4ec 50%, #f3e5f5 100%); border-radius: var(--radius); padding: 28px 20px 24px; text-align: center; margin-bottom: 24px; border: 1px solid #f8bbd0; }
.kv-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--pink); margin-bottom: 8px; }
.kv h1 { font-family: 'Noto Serif JP', serif; font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.6; margin-bottom: 10px; }
.kv-sub { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
.kv-work { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 12px; }
.kv-tag { font-size: 11px; background: rgba(233,30,99,0.08); color: var(--pink-dark); padding: 3px 10px; border-radius: 999px; font-weight: 700; }
.progress-wrap { margin-bottom: 20px; }
.progress-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
.progress-step { font-size: 12px; font-weight: 700; color: var(--pink); }
.progress-bar { height: 6px; background: var(--pink-light); border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink), var(--purple)); border-radius: 999px; transition: width 0.5s ease; }
.q-card { background: var(--white); border-radius: var(--radius); padding: 28px 20px 24px; box-shadow: var(--shadow); border: 1px solid rgba(233,30,99,0.08); }
.q-num { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--white); background: linear-gradient(135deg, var(--pink), var(--purple)); padding: 3px 12px; border-radius: 999px; margin-bottom: 14px; }
.q-text { font-family: 'Noto Serif JP', serif; font-size: 19px; font-weight: 700; line-height: 1.6; color: var(--text); margin-bottom: 24px; }
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice-btn { background: var(--bg); border: 1.5px solid #f0c0d0; border-radius: 999px; padding: 14px 18px; font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; font-weight: 500; color: var(--text); cursor: pointer; transition: all 0.18s; text-align: left; display: flex; align-items: center; gap: 12px; width: 100%; line-height: 1.4; }
.choice-btn:hover { background: var(--pink-light); border-color: var(--pink); transform: translateY(-1px); }
.choice-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--pink-light); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.result-section { display: none; }
.result-section.show { display: block; }
.result-header { border-radius: var(--radius) var(--radius) 0 0; padding: 28px 20px 20px; text-align: center; }
.result-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; margin-bottom: 6px; opacity: 0.75; }
.result-name { font-family: 'Noto Serif JP', serif; font-size: 26px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; }
.result-work-name { font-size: 12px; opacity: 0.7; line-height: 1.6; padding: 0 8px; }
.result-img-wrap { width: 100%; aspect-ratio: 4/3; background: var(--pink-light); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.result-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.result-img-placeholder { text-align: center; color: var(--text-muted); padding: 20px; }
.result-img-placeholder .img-icon { font-size: 48px; margin-bottom: 8px; opacity: 0.4; }
.result-img-placeholder p { font-size: 13px; line-height: 1.6; opacity: 0.6; }
.result-body { background: var(--white); border: 1px solid rgba(233,30,99,0.08); border-top: none; border-radius: 0 0 var(--radius) var(--radius); padding: 20px; box-shadow: var(--shadow); }
.result-catch { font-family: 'Noto Serif JP', serif; font-size: 16px; font-weight: 700; color: var(--pink-dark); font-style: italic; margin-bottom: 12px; padding-left: 12px; border-left: 3px solid var(--pink); }
.result-desc { font-size: 14px; line-height: 1.85; color: var(--text); margin-bottom: 16px; }
.points-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px; }
.points { list-style: none; margin-bottom: 20px; }
.points li { font-size: 13px; color: var(--text); padding: 8px 0 8px 20px; border-bottom: 1px solid #fce4ec; position: relative; line-height: 1.5; }
.points li:last-child { border-bottom: none; }
.points li::before { content: '♡'; position: absolute; left: 0; color: var(--pink); font-size: 12px; top: 50%; transform: translateY(-50%); }
.btn-share { width: 100%; padding: 15px; border-radius: 999px; border: none; background: linear-gradient(135deg, var(--pink), var(--purple)); color: white; font-family: 'Zen Maru Gothic', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: all 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-share:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-retry { width: 100%; padding: 13px; border-radius: 999px; border: 1.5px solid #f0c0d0; background: transparent; color: var(--pink-dark); font-family: 'Zen Maru Gothic', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.18s; margin-bottom: 16px; }
.btn-retry:hover { background: var(--pink-light); }
.footer-link { text-align: center; padding-top: 8px; }
.footer-link a { font-size: 12px; color: var(--text-muted); text-decoration: none; border-bottom: 1px solid #f0c0d0; padding-bottom: 1px; }
.site-footer { text-align: center; padding: 24px 0 0; font-size: 11px; color: var(--text-muted); line-height: 1.8; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">
  <header class="site-header">
    <span class="site-logo">COMIC ROOM</span>
  </header>
  <div class="kv">
    <div class="kv-eyebrow">★ SPECIAL CONTENTS ★</div>
    <h1>あなたにぴったりの<br>推しメンは誰？</h1>
    <p class="kv-sub">4つの質問に答えるだけ♡<br>あなたの恋愛タイプから推しメンを診断！</p>
    <div class="kv-work">
      <span class="kv-tag">溺れるほど愛されて、幸せになってみせますわ！</span>
      <span class="kv-tag">24巻 イケメン図鑑</span>
    </div>
  </div>
  <div id="q-section">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-step" id="progress-label">QUESTION 1 / 4</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width:0%"></div>
      </div>
    </div>
    <div class="q-card" id="q-card">
      <div class="q-num" id="q-num">Q1</div>
      <div class="q-text" id="q-text">読み込み中...</div>
      <div class="choices" id="choices"></div>
    </div>
  </div>
  <div class="result-section" id="result-section">
    <div class="result-header" id="r-header">
      <div class="result-eyebrow" id="r-eyebrow">あなたの推しメンは...</div>
      <div class="result-name" id="r-name"></div>
      <div class="result-work-name" id="r-work"></div>
    </div>
    <div class="result-img-wrap" id="r-img-wrap">
      <div class="result-img-placeholder">
        <div class="img-icon">★</div>
        <p>ここにキャラのコマ画像が入ります</p>
      </div>
    </div>
    <div class="result-body">
      <div class="result-catch" id="r-catch"></div>
      <div class="result-desc" id="r-desc"></div>
      <div class="points-title">あなたとの相性ポイント</div>
      <ul class="points" id="r-points"></ul>
      <button class="btn-share" id="share-btn">結果をXでシェアする</button>
      <button class="btn-retry" id="retry-btn">もう一度診断する</button>
      <div class="footer-link">
        <a href="https://note.com/comicroom/n/n97b1c85cbde2" target="_blank">イケメン図鑑をnoteで読む</a>
      </div>
    </div>
  </div>
  <footer class="site-footer">
    <p>© COMIC ROOM All Rights Reserved.</p>
    <p>掲載画像の無断転載を禁じます。</p>
  </footer>
</div>
<script>
var questions = [
  {
    text: "好きな人といる時、どんな自分でいたい？",
    choices: [
      { label: "ドキドキ・キラキラした自分でいたい", icon: "✨", scores: {"ヘンリー":2,"ルーエン":1} },
      { label: "自然体で、ほっとしていたい", icon: "🍃", scores: {"ヘイゼン":2,"ライル":1,"ユークリッド":1} }
    ]
  },
  {
    text: "気になる人と二人きりになったら？",
    choices: [
      { label: "自分から話しかけてしまう", icon: "💬", scores: {"ヘンリー":2,"ライル":1} },
      { label: "相手のペースに合わせてしまう", icon: "🌸", scores: {"ルーエン":2,"ヘイゼン":1} }
    ]
  },
  {
    text: "好きな人のどんな表情に惚れる？",
    choices: [
      { label: "クールなのに、私にだけ見せる顔", icon: "🌙", scores: {"ルーエン":2,"ユークリッド":1} },
      { label: "まっすぐ目を見て笑いかけてくる顔", icon: "☀️", scores: {"ヘンリー":2,"ライル":1} }
    ]
  },
  {
    text: "ずっと一緒にいたい人は？",
    choices: [
      { label: "昔から知っている、安心できる人", icon: "🌊", scores: {"ヘイゼン":2,"ユークリッド":1} },
      { label: "一緒にいると自分も頑張れる人", icon: "⚔️", scores: {"ユークリッド":2,"ライル":2} }
    ]
  }
];

var results = {
  "ライル": {
    name: "ライル・ウィンザー",
    work: "『男に変身した私を兄弟と呼ぶなら、溺愛はやめてください！』",
    catch: "夢を語る横顔に、恋をする。",
    desc: "あなたの推しメンはライル！夢に向かってまっすぐな彼の隣で、あなたも自然と輝けるはず。少年っぽい笑顔の裏にある誠実さに、気づいた時にはもう遅い。",
    points: ["夢を語られると応援したくなるタイプ","素直に感情を出してくれる人が好き","一緒に成長できる関係に憧れる"],
    bg: "linear-gradient(160deg,#fff8e1,#fff3e0,#fce4ec)", color: "#e65100", img: "img/lyle.jpg", url: "https://www.cmoa.jp/title/349391/"
  },
  "ルーエン": {
    name: "ルーエン",
    work: "『悪魔に恋をしてしまったのですが、成就してもいいですか？』",
    catch: "悪魔のくせに、不器用すぎる。",
    desc: "あなたの推しメンはルーエン！クールな言動の奥にある不器用な本音を、見抜けるのはあなただけ。褒められてドヤ顔をする悪魔に、あなたはもう落とされています。",
    points: ["クールな人のギャップに弱い","素直じゃない人の本音を引き出したい","独占欲の強い愛され方が好き"],
    bg: "linear-gradient(160deg,#f3e5f5,#ede7f6,#e8eaf6)", color: "#6a1b9a", img: "img/luen.jpg", url: "https://www.cmoa.jp/title/349387/"
  },
  "ヘンリー": {
    name: "ヘンリー・オスカルド",
    work: "『ある日、拳で王太子様を救ったら、まさかの溺愛ルートに突入しました』",
    catch: "逃げても、また来る。それが王太子。",
    desc: "あなたの推しメンはヘンリー！好きになったら一直線、毎日会いに来る純粋な執着。その真剣な眼差しに、逃げるつもりが逃げられなくなるのがあなたのパターン。",
    points: ["まっすぐ愛情を向けてくれる人に弱い","ストイックで芯のある人が好き","王道の溺愛展開にときめく"],
    bg: "linear-gradient(160deg,#e3f2fd,#e8eaf6,#fce4ec)", color: "#0d47a1", img: "img/henry.jpg", url: "https://www.cmoa.jp/title/349390/"
  },
  "ヘイゼン": {
    name: "ヘイゼン",
    work: "『シンデレラに魔法をかけたのは、落ちこぼれ魔法使いでした』",
    catch: "ずっとそこにいたのに、急に好きになった。",
    desc: "あなたの推しメンはヘイゼン！当たり前のように隣にいて、当たり前のように助けてくれる。その「当たり前」が特別だったと気づいた時、あなたの恋は始まっています。",
    points: ["安心できる空気感の人が好き","さりげない気遣いにときめく","幼なじみ・長年の縁に弱い"],
    bg: "linear-gradient(160deg,#e0f7fa,#e8f5e9,#f3e5f5)", color: "#006064", img: "img/hazen.jpg", url: "https://www.cmoa.jp/title/349388/"
  },
  "ユークリッド": {
    name: "アルバス＝ユークリッド",
    work: "『こう見えて最強軍師ですのでボンボン騎士団長を英雄に導きますわ』",
    catch: "笑うと、ずるい。心までイケメンって。",
    desc: "あなたの推しメンはユークリッド！頼りなさそうに見えて、心の強さと優しさは誰にも負けない。一緒にいると自分まで強くなれる気がする、そんな関係があなたには似合っています。",
    points: ["外見より内面で惚れるタイプ","お互いを高め合える関係が理想","成長していく過程を一緒に見たい"],
    bg: "linear-gradient(160deg,#f1f8e9,#e8f5e9,#fce4ec)", color: "#1b5e20", img: "img/euclid.jpg", url: "https://www.cmoa.jp/title/349389/"
  }
};

var scoreBoard = {"ライル":0,"ルーエン":0,"ヘンリー":0,"ヘイゼン":0,"ユークリッド":0};
var currentIndex = 0;

function showQuestion(index) {
  var q = questions[index];
  document.getElementById("progress").style.width = ((index / 4) * 100) + "%";
  document.getElementById("progress-label").textContent = "QUESTION " + (index + 1) + " / 4";
  document.getElementById("q-num").textContent = "Q" + (index + 1);
  document.getElementById("q-text").textContent = q.text;
  var c = document.getElementById("choices");
  c.innerHTML = "";
  for (var i = 0; i < q.choices.length; i++) {
    (function(ch) {
      var btn = document.createElement("button");
      btn.className = "choice-btn";
      btn.innerHTML = '<span class="choice-icon">' + ch.icon + '</span>' + ch.label;
      btn.onclick = function() {
        var keys = Object.keys(ch.scores);
        for (var k = 0; k < keys.length; k++) {
          scoreBoard[keys[k]] += ch.scores[keys[k]];
        }
        var nextIndex = index + 1;
        if (nextIndex < questions.length) {
          document.getElementById("q-card").style.opacity = "0";
          setTimeout(function() {
            document.getElementById("q-card").style.opacity = "1";
            showQuestion(nextIndex);
          }, 200);
        } else {
          var winner = "ライル";
          var maxScore = -1;
          var skeys = Object.keys(scoreBoard);
          for (var s = 0; s < skeys.length; s++) {
            if (scoreBoard[skeys[s]] > maxScore) {
              maxScore = scoreBoard[skeys[s]];
              winner = skeys[s];
            }
          }
          showResult(winner);
        }
      };
      c.appendChild(btn);
    })(q.choices[i]);
  }
}

function showResult(key) {
  document.getElementById("progress").style.width = "100%";
  document.getElementById("progress-label").textContent = "診断完了！";
  document.getElementById("q-section").classList.add("hidden");
  var r = results[key];
  var header = document.getElementById("r-header");
  header.style.background = r.bg;
  document.getElementById("r-eyebrow").style.color = r.color;
  document.getElementById("r-name").textContent = r.name;
  document.getElementById("r-name").style.color = r.color;
  document.getElementById("r-work").textContent = r.work;
  document.getElementById("r-work").style.color = r.color;
  document.getElementById("r-catch").textContent = r.catch;
  document.getElementById("r-desc").textContent = r.desc;
  var imgWrap = document.getElementById("r-img-wrap");
  imgWrap.style.background = r.bg;
  var img = new Image();
  img.onload = function() {
    imgWrap.innerHTML = "";
    var positions = {"ルーエン":"top","ライル":"top"};
  var pos = positions[key] || "center";
  img.style.cssText = "width:100%;height:100%;object-fit:cover;object-position:" + pos + ";";
    imgWrap.appendChild(img);
  };
  img.src = r.img;
  var ul = document.getElementById("r-points");
  ul.innerHTML = "";
  for (var i = 0; i < r.points.length; i++) {
    var li = document.createElement("li");
    li.textContent = r.points[i];
    ul.appendChild(li);
  }
  document.getElementById("result-section").classList.add("show");
  document.getElementById("share-btn").onclick = function() {
    var text = encodeURIComponent("私の推しメンは「" + r.name + "」でした♡\n" + r.catch + "\n\n#溺愛アンソロ推しメン診断 #COMICROOM\nhttps://shiryukoyama.github.io/ikemen-shindan/");
    window.open("https://twitter.com/intent/tweet?text=" + text, "_blank");
  };
  document.getElementById("retry-btn").onclick = function() {
    scoreBoard = {"ライル":0,"ルーエン":0,"ヘンリー":0,"ヘイゼン":0,"ユークリッド":0};
    document.getElementById("q-section").classList.remove("hidden");
    document.getElementById("result-section").classList.remove("show");
    document.getElementById("q-card").style.opacity = "1";
    showQuestion(0);
  };
}

window.onload = function() { showQuestion(0); };
</script>
</body>
</html>
